services:
  - type: web
    name: customer-churn-prediction
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health

    envVars:
      # ── Runtime ──────────────────────────────────────────────────────────────
      - key: ENVIRONMENT
        value: production

      # ── CORS — allow the Vercel frontend origin ───────────────────────────────
      - key: CORS_ORIGINS
        value: https://customer-churn-prediction-dun.vercel.app

      # ── Cookie — SameSite=none + Secure required for cross-origin credentialed
      #    requests (Vercel frontend → Render backend).  Browsers reject SameSite=none
      #    without Secure, so both must be set together.
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: none

      # ── Token lifetimes ───────────────────────────────────────────────────────
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"

      # ── Brute-force protection ────────────────────────────────────────────────
      - key: LOGIN_MAX_ATTEMPTS
        value: "5"
      - key: LOGIN_LOCKOUT_MINUTES
        value: "15"

      # ── Secrets — set these manually in the Render dashboard; sync:false
      #    tells Render not to generate or overwrite them from this file.
      - key: SECRET_KEY
        sync: false
      - key: REFRESH_SECRET_KEY
        sync: false
