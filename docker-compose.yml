version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: churnguard-backend
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}
      - REFRESH_SECRET_KEY=${REFRESH_SECRET_KEY:?REFRESH_SECRET_KEY must be set in .env}
      - DATABASE_URL=sqlite:////app/data/churn.db
      - DATA_DIR=/app/data
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - LOGIN_MAX_ATTEMPTS=${LOGIN_MAX_ATTEMPTS:-5}
      - LOGIN_LOCKOUT_MINUTES=${LOGIN_LOCKOUT_MINUTES:-15}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - COOKIE_SAMESITE=${COOKIE_SAMESITE:-lax}
    volumes:
      - churn_data:/app/data
    ports:
      - "8000:8000"
    # Security: drop all Linux capabilities, prevent privilege escalation
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""   # Empty = use nginx proxy (relative URLs)
    container_name: churnguard-frontend
    restart: unless-stopped
    ports:
      - "3000:8080"   # nginx-unprivileged listens on 8080
    depends_on:
      backend:
        condition: service_healthy
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run

volumes:
  churn_data:
    driver: local
