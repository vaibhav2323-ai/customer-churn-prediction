# ── Rate-limiting zones ────────────────────────────────────────────────────────
# Defined at the http{} level in the main nginx config; here we reference them.
# If running standalone (not behind nginx-proxy) uncomment and add to an http{} block.
# limit_req_zone $binary_remote_addr zone=auth:10m   rate=5r/m;
# limit_req_zone $binary_remote_addr zone=api:10m    rate=30r/m;
# limit_req_zone $binary_remote_addr zone=static:10m rate=120r/m;

server {
    # nginxinc/nginx-unprivileged listens on 8080 (non-root cannot bind 80/443)
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Hardening ─────────────────────────────────────────────────────────────
    server_tokens off;       # Hide nginx version in headers and error pages

    # ── Security headers ──────────────────────────────────────────────────────
    # These are also set by the FastAPI middleware for /api responses.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header X-XSS-Protection          "1; mode=block"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=()" always;

    # Content-Security-Policy
    # 'unsafe-inline' is required for Tailwind JIT and Recharts SVG styles.
    # Tighten with nonce-based CSP once the build pipeline supports it.
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src  'self' 'unsafe-inline'; \
         style-src   'self' 'unsafe-inline'; \
         img-src     'self' data: blob:; \
         font-src    'self'; \
         connect-src 'self'; \
         worker-src  blob:; \
         frame-ancestors 'none'; \
         base-uri 'self'; \
         form-action 'self';" always;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml image/svg+xml;

    # ── SPA routing ───────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        # No-cache for index.html so the browser always gets the latest app shell
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Auth endpoints — strictest rate limit ─────────────────────────────────
    location ~ ^/auth/(login|register) {
        # limit_req zone=auth burst=3 nodelay;   # uncomment if zones defined above
        # limit_req_status 429;

        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;

        # Forward cookies for httpOnly refresh token
        proxy_pass_header  Set-Cookie;
    }

    # ── All other API endpoints ───────────────────────────────────────────────
    location ~ ^/(auth|predictions|dashboard|customers|health) {
        # limit_req zone=api burst=10 nodelay;   # uncomment if zones defined above
        # limit_req_status 429;

        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;

        proxy_pass_header  Set-Cookie;
    }

    # ── Static assets — immutable cache ──────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|map|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Block sensitive paths ─────────────────────────────────────────────────
    location ~ /\.(env|git|gitignore|htaccess|DS_Store) {
        deny all;
        return 404;
    }

    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /api/\n";
    }

    # ── Error pages (no nginx version leak) ──────────────────────────────────
    error_page 404 /index.html;
    error_page 429 @rate_limited;
    location @rate_limited {
        add_header Retry-After 60 always;
        return 429 '{"detail":"Too many requests — please slow down."}';
    }
}
