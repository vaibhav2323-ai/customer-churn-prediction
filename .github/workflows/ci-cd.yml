name: CI/CD — Build, Security Scan, Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/churnguard

# ── 1. Secret detection — runs on every push/PR ───────────────────────────────
jobs:
  secret-scan:
    name: Secret Detection (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Detection (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
          GITLEAKS_ENABLE_SUMMARY: false

# ── 2. Backend security scans ─────────────────────────────────────────────────
  security-backend:
    name: Backend Security (bandit + pip-audit)
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Install app dependencies (for pip-audit)
        run: pip install -r requirements.txt --quiet

      - name: bandit — Python SAST
        run: bandit -r . --exit-zero --format json -o bandit-report.json

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: backend/bandit-report.json

      - name: pip-audit — dependency vulnerability check
        run: pip-audit -r requirements.txt --exit-zero

# ── 3. Frontend security scan ─────────────────────────────────────────────────
  security-frontend:
    name: Frontend Security (npm audit)
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: npm audit (critical only)
        run: npm audit --audit-level=critical

# ── 4. Backend tests ──────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [security-backend]
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov httpx

      - name: Train ML model
        run: python -m ml.train

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=app --cov-report=xml 2>/dev/null || echo "No tests yet"

# ── 5. Frontend build ─────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [security-frontend]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ""

# ── 6. Build Docker images & run Trivy scan ───────────────────────────────────
  docker-build-scan:
    name: Docker Build + Trivy Scan
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push'

    permissions:
      contents: read
      security-events: write   # Required to upload SARIF results

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image (local only for scanning)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: churnguard-backend:scan
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy — scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: churnguard-backend:scan
          format: sarif
          output: trivy-backend.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'    # Fail CI on HIGH/CRITICAL findings
          ignore-unfixed: true

      - name: Upload Trivy SARIF (backend)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Build frontend image (local only for scanning)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: churnguard-frontend:scan
          load: true
          cache-from: type=gha

      - name: Trivy — scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: churnguard-frontend:scan
          format: sarif
          output: trivy-frontend.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy SARIF (frontend)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

# ── 7. Push images to registry (main branch only) ────────────────────────────
  push-images:
    name: Push Docker Images
    runs-on: ubuntu-latest
    needs: [docker-build-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: VITE_API_URL=
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ── 8. Deploy (adapt to your platform) ───────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [push-images]
    environment: production       # Requires environment approval in GitHub

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/churnguard
            docker compose pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
            docker system prune -f --filter "until=24h"
